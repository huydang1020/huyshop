syntax = "proto3";
package pb;

message ConfigRequest {
    string id = 1;
    int32 limit = 2;
    int32 offset = 3;
    string state = 4;
    string owner = 5;
    string url = 6;
}

message Config {
    // `xorm:"pk"`
    string id = 1;
    string timezone = 2;
    string expression = 3;
    string method = 4;
    // `xorm:"text"`
    string body = 5;
    string url = 6;
    // `xorm:"text"`
    string description = 7;
    string state = 8;
    enum State {
        active = 0;
        inactive = 1;
    }
    int64 created = 9;
    string owner = 10;
    int64 updated_at = 11;
}

message LogRequest {
    int64 id = 1;
    int32 limit = 2;
    int32 offset = 3;
    string config_id = 4;
    string owner = 5;
    string request = 6;
    string response = 7;
}

message Log {
    // `xorm:"pk notnull autoincr"`
    int64 id = 1;
    string url = 2;
    // `xorm:"text"`
    string request = 3;
    int32 http_code = 4;
    // `xorm:"text"`
    string response = 5;
    int32 duration = 6;
    string config_id = 7;
    string owner = 8;
    int64 created = 9;
}