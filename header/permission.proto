// 	string role_id = 2;
// }

message PageRequest {
    string id = 1;
    repeated string ids = 2;
	string role_id = 3;
    string name = 4;
    repeated string role_ids = 5;
    string route = 6;
    string type = 7;
    string parent_id = 8;
    int32 limit = 9;
    int32 skip = 10;
}

message PolicyRequest {
    string role_id =1;
    string group = 2;
    string action = 3;
}

message MenuData {
    string path = 1;
    Handle handle = 2;
    repeated MenuData children = 3;
}

message Handle {
    string icon = 1;
    string icon_type = 2;
    string title = 3;
    int32 order = 4;
    // json:"iframeLink"
    string iframe_link = 5; 
    // json:"externalLink"
    string external_link = 6;
    repeated string roles = 7; 
    repeated string permissions = 8;
    // `xorm:"keep_alive" json:"keepAlive"`
    bool keep_alive = 9;
    // `xorm:"hide_in_menu" json:"hideInMenu"`
    bool hide_in_menu = 10;
}
